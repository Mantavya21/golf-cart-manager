<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Cart Manager (Live)</title>
    <!-- 1. Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Custom Styles -->
    <style>
        body { font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: #fefefe; margin: auto; padding: 24px; border: 1px solid #888; width: 90%; max-width: 400px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .modal.flex { display: flex; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased font-sans">

    <!-- Main Container -->
    <div class="container mx-auto max-w-4xl p-4 md:p-8">
        
        <!-- =================================================================
        PAGE 1: MAIN TABLE (Read)
        ================================================================== -->
        <div id="page-main" class="page active">
            <header class="mb-6">
                <h1 class="text-4xl font-bold text-gray-900 mb-2">Golf Cart Manager</h1>
                <p class="text-lg text-gray-600">Live Connection to Postgres</p>
            </header>

            <!-- Action Buttons -->
            <div class="mb-6">
                <button 
                    onclick="showPage('page-insert')"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-5 rounded-lg shadow-lg transition duration-150 ease-in-out transform hover:scale-105">
                    Insert New Cart
                </button>
            </div>

            <!-- Status Message -->
            <div id="status-message" class="hidden p-4 mb-4 rounded-lg text-white font-semibold"></div>

            <!-- Golf Cart Table -->
            <div class="bg-white rounded-lg shadow-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cart No</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Capacity</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Pickup</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Drop Point</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="cart-table-body" class="bg-white divide-y divide-gray-200">
                            <!-- Rows will be inserted here by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- =================================================================
        PAGE 2: INSERT FORM
        ================================================================== -->
        <div id="page-insert" class="page">
            <header class="mb-6">
                <h1 class="text-4xl font-bold text-gray-900 mb-2">Insert New Cart</h1>
                <p class="text-lg text-gray-600">Enter the details for the new golf cart.</p>
            </header>

            <form id="insert-form" class="bg-white p-8 rounded-lg shadow-xl">
                <div class="space-y-6">
                    <div>
                        <label for="insert-capacity" class="block text-sm font-medium text-gray-700">Capacity</label>
                        <input type="number" id="insert-capacity" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="insert-pickup" class="block text-sm font-medium text-gray-700">Pickup Location</label>
                        <input type="text" id="insert-pickup" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="insert-droppoint" class="block text-sm font-medium text-gray-700">Drop Point</label>
                        <input type="text" id="insert-droppoint" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                </div>
                <div class="mt-8 flex items-center space-x-4">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition duration-150 ease-in-out transform hover:scale-105">
                        Add Cart
                    </button>
                    <button type="button" onclick="showPage('page-main')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg shadow-md transition duration-150 ease-in-out">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- =================================================================
        PAGE 3: UPDATE FORM
        ================================================================== -->
        <div id="page-update" class="page">
            <header class="mb-6">
                <h1 class="text-4xl font-bold text-gray-900 mb-2">Update Cart</h1>
                <p class="text-lg text-gray-600">Edit the details for the selected golf cart.</p>
            </header>

            <form id="update-form" class="bg-white p-8 rounded-lg shadow-xl">
                <input type="hidden" id="update-id">
                <div class="space-y-6">
                    <div>
                        <label for="update-capacity" class="block text-sm font-medium text-gray-700">Capacity</label>
                        <input type="number" id="update-capacity" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="update-pickup" class="block text-sm font-medium text-gray-700">Pickup Location</label>
                        <input type="text" id="update-pickup" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="update-droppoint" class="block text-sm font-medium text-gray-700">Drop Point</label>
                        <input type="text" id="update-droppoint" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                </div>
                <div class="mt-8 flex items-center space-x-4">
                    <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition duration-150 ease-in-out transform hover:scale-105">
                        Save Changes
                    </button>
                    <button type="button" onclick="showPage('page-main')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg shadow-md transition duration-150 ease-in-out">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

    </div> <!-- End Main Container -->

    <!-- =================================================================
    DELETE CONFIRMATION MODAL
    ================================================================== -->
    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold mb-4">Confirm Deletion</h2>
            <p id="delete-modal-text" class="text-gray-700 mb-6"></p>
            <div class="flex justify-end space-x-4">
                <button id="modal-cancel" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg shadow-sm transition duration-150 ease-in-out">
                    Cancel
                </button>
                <button id="modal-confirm-delete" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow transition duration-150 ease-in-out">
                    Delete
                </button>
            </div>
        </div>
    </div>


    <!-- =================================================================
    JAVASCRIPT
    ================================================================== -->
    <script>
        // === 1. GLOBAL VARIABLES ===
        const API_URL = 'http://localhost:3000/api/golfcarts'; // Our back-end server address
        const tableBody = document.getElementById('cart-table-body');
        const insertForm = document.getElementById('insert-form');
        const updateForm = document.getElementById('update-form');
        const deleteModal = document.getElementById('delete-modal');
        const modalConfirmDelete = document.getElementById('modal-confirm-delete');
        const modalCancel = document.getElementById('modal-cancel');
        const statusMessage = document.getElementById('status-message');
        let cartIdToHandle = null; 

        // === 2. PAGE NAVIGATION ===
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            statusMessage.classList.add('hidden');
        }

        // === 3. SHOW STATUS MESSAGE ===
        function showStatusMessage(message, isError = false) {
            statusMessage.textContent = message;
            statusMessage.classList.remove('hidden', 'bg-green-600', 'bg-red-600');
            statusMessage.classList.add(isError ? 'bg-red-600' : 'bg-green-600');
            window.scrollTo(0, 0);
        }

        // === 4. READ (Render Table) ===
        // This function draws the table on the screen
        async function renderTable() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    // Try to parse the error message from the server
                    let errorText = `HTTP error! Status: ${response.status}`;
                    try {
                        const errData = await response.json();
                        errorText = errData.error || errorText;
                    } catch (e) {
                        // Could not parse JSON, use status text
                        errorText = response.statusText;
                    }
                    throw new Error(errorText);
                }
                const carts = await response.json();

                tableBody.innerHTML = '';
                if (carts.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No carts found.</td></tr>`;
                    return;
                }

                carts.forEach(cart => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50';
                    // Added escaping for string parameters in onclick handlers
                    const safePickup = cart.pickup.replace(/'/g, "\\'");
                    const safeDroppoint = cart.droppoint.replace(/'/g, "\\'");

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${cart.cart_no}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${cart.capacity}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${cart.pickup}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${cart.droppoint}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-4">
                            <button onclick="handleUpdateClick(${cart.cart_no}, ${cart.capacity}, '${safePickup}', '${safeDroppoint}')" class="text-green-600 hover:text-green-900 font-semibold">Update</button>
                            <button onclick="handleDeleteClick(${cart.cart_no}, '${safePickup}')" class="text-red-600 hover:text-red-900 font-semibold">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                // Added more descriptive error messages for "Failed to fetch"
                let errorMsg = 'Error loading carts. Is the server running? (Check terminal)';
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = 'NETWORK ERROR: Could not load carts. Is your `server.js` running in the terminal?';
                } else {
                    errorMsg = `SERVER ERROR: ${error.message}. Is your table name ("golfcart") correct in server.js?`;
                }
                showStatusMessage(errorMsg, true);
                console.error('Error fetching carts:', error);
            }
        }

        // === 5. CREATE (Insert Data) ===
        insertForm.addEventListener('submit', async (event) => {
            event.preventDefault(); 
            
            const capacity = document.getElementById('insert-capacity').value;
            const pickup = document.getElementById('insert-pickup').value;
            const droppoint = document.getElementById('insert-droppoint').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ capacity: parseInt(capacity), pickup, droppoint })
                });
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Failed to create cart');
                }
                
                const newCart = await response.json();
                
                renderTable();
                showPage('page-main');
                showStatusMessage(`Cart #${newCart.cart_no} created successfully!`, false);
                insertForm.reset();
            } catch (error) {
                let errorMsg = error.message;
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = 'NETWORK ERROR: Could not create cart. Is your `server.js` running?';
                }
                showPage('page-main');
                showStatusMessage(errorMsg, true);
            }
        });

        // === 6. UPDATE (Prepare & Submit Data) ===
        
        // This function finds the cart data and fills the update form
        function handleUpdateClick(id, capacity, pickup, droppoint) {
            document.getElementById('update-id').value = id;
            document.getElementById('update-capacity').value = capacity;
            document.getElementById('update-pickup').value = pickup;
            document.getElementById('update-droppoint').value = droppoint;
            showPage('page-update');
        }

        // This handles the update form submission
        updateForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const id = parseInt(document.getElementById('update-id').value);
            const capacity = parseInt(document.getElementById('update-capacity').value);
            const pickup = document.getElementById('update-pickup').value;
            const droppoint = document.getElementById('update-droppoint').value;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ capacity, pickup, droppoint })
                });
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Failed to update cart');
                }

                renderTable();
                showPage('page-main');
                showStatusMessage(`Cart #${id} updated successfully!`, false);
            } catch (error) {
                let errorMsg = error.message;
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = 'NETWORK ERROR: Could not update cart. Is your `server.js` running?';
                }
                showPage('page-main');
                showStatusMessage(errorMsg, true);
            }
        });


        // === 7. DELETE (Show Modal & Process) ===

        // This shows the confirmation popup
        function handleDeleteClick(id, pickup) {
            cartIdToHandle = id;
            document.getElementById('delete-modal-text').textContent = `Are you sure you want to delete Cart #${id} (Pickup: ${pickup})? This action cannot be undone.`;
            deleteModal.classList.add('flex');
        }

        // This runs when you click the final "Delete" button
        modalConfirmDelete.addEventListener('click', async () => {
            if (!cartIdToHandle) return;

            try {
                const response = await fetch(`${API_URL}/${cartIdToHandle}`, {
                    method: 'DELETE'
                });
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Failed to delete cart');
                }
                
                renderTable();
                deleteModal.classList.remove('flex');
                showStatusMessage(`Cart #${cartIdToHandle} deleted successfully!`, false);
                cartIdToHandle = null;
            } catch (error) {
                let errorMsg = error.message;
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = 'NETWORK ERROR: Could not delete cart. Is your `server.js` running?';
                }
                deleteModal.classList.remove('flex');
                showStatusMessage(errorMsg, true);
                cartIdToHandle = null;
            }
        });

        // This runs when you click "Cancel" on the popup
        modalCancel.addEventListener('click', () => {
            deleteModal.classList.remove('flex');
            cartIdToHandle = null;
        });

        // === 8. INITIAL LOAD ===
        document.addEventListener('DOMContentLoaded', renderTable);

    </script>
</body>
</html>
